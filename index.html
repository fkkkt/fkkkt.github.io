<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的前端主页</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 0;
        }
        header {
            background: #4f8cff;
            color: #fff;
            padding: 40px 0 20px 0;
            text-align: center;
        }
        main {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            padding: 32px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }
        p {
            color: #555;
            font-size: 1.2em;
        }
        nav {
            margin-top: 30px;
            text-align: center;
        }
        nav a {
            display: inline-block;
            margin: 0 15px;
            color: #4f8cff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }
        nav a:hover {
            color: #2d5fa4;
        }
        footer {
            text-align: center;
            color: #aaa;
            padding: 20px 0;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的前端主页</h1>
        <p>专注于前端开发与技术分享</p>
    </header>
    <main>
        <section>
            <h2>关于我</h2>
            <p>你好！我是前端开发者，热爱Web技术，喜欢用代码创造美好的用户体验。</p>
        </section>
        <section>
            <h2>我的技能</h2>
            <ul>
                <li>HTML5 / CSS3 / JavaScript</li>
                <li>Vue / React / Angular</li>
                <li>响应式设计与移动端开发</li>
                <li>前端工程化与性能优化</li>
            </ul>
        </section>
        <nav>
            <a href="#">项目展示</a>
            <a href="#">技术博客</a>
            <a href="#">联系我</a>
        </nav>
    </main>
    <footer>
        &copy; 2024 我的前端主页
    </footer>
</body>
</html>
